<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hidro Soluções</title>
    <link
      rel="stylesheet"
      href="mobilestyle.css"
      media="screen and (max-width: 768px)"
    />
    <link
      rel="stylesheet"
      href="webstyle.css"
      media="screen and (min-width: 769px)"
    />
  </head>
  <body>
    <!----------------------------------- TELA E LOGIN ----------------------------->
    <section class="teladelogin" id="teladeLogin">
      <div class="divimagem">
        <img class="logomarca" id="logomarca" src="/Imagens/Logo Hidro.jpg" alt="Logo" />
      </div>
      <article class="articlecredenciais login" id="articlecredenciais">
        <div class="divcredenciaispai">
          <p class="pergunta" id="pergunta">Já é nosso cliente?</p>
          <div class="divbtpaigeral">
            <div class="divbotaopai">
              <div class="divbotaologin ativo" id="divbotaologin">
                <p class="textologin txativo" id="textologin">Login</p>
              </div>
              <div class="divbotaocadastrar inativo" id="divbotaocadastrar">
                <p class="textocadastrar txinativo" id="textocadastrar">
                  Cadastro
                </p>
              </div>
            </div>
          </div>
          <div class="divcredenciaisfilha">
            <h1 class="titleacao" id="titleacao">Faça login</h1>

            <div class="divformulario" id="divformulariologin">
              <input
                class="email"
                type="email"
                id="email"
                placeholder="Digite seu e-mail"
              />
              <input
                class="senha"
                type="password"
                id="senha"
                placeholder="Digite sua senha"
              />
            </div>

            <div class="divformulario invisivel" id="divformulariocadastro">
              <input
                class="nome"
                type="text"
                placeholder="Informe seu nome"
              />
              <input
                class="cpf"
                type="number"
                placeholder="Informe seu CPF"
              />
              <input
                class="email"
                type="email"
                placeholder="Informe seu e-mail"
              />
              <input
                class="whatsapp"
                type="number"
                placeholder="Informe seu WhatsApp"
              />
              <input
                class="senha"
                type="password"
                placeholder="Crie uma senha"
              />
              <input
                class="senha"
                type="password"
                placeholder="Confirme a senha"
              />
            </div>
            <button class="botaoentrar" id="loginok">Entrar</button>
            <button class="botaocadastrook invisivel" id="botaocadastrook">
              Confirmar
            </button>
          </div>
        </div>
      </article>
      <div>

      <div class="divsobre" id="divsobre">
        <p class="psobre" id="psobre">Sobre nós</p>
      </div>
    </section>

    <script src="scripts/login.js"></script>
  </body>
</html>
